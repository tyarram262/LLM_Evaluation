# Render Blueprint — provisions the API service + managed Postgres together.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: llm-eval-api
    runtime: docker            # builds from the Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Secrets — set these in the Render dashboard (sync:false = not in git)
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEYS
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Wired automatically from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: llm-eval-db
          property: connectionString
      # Non-secret config
      - key: MODEL_ID
        value: gemini-2.0-flash
      - key: MAX_TOKENS
        value: "1024"
      - key: REQUEST_TIMEOUT
        value: "30"
      - key: MAX_RETRIES
        value: "3"
      - key: RATE_LIMIT
        value: 60/minute
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: llm-eval-db
    plan: free
    databaseName: llmeval
    user: llmeval
