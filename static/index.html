<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Eval Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #181b24;
      --panel-2: #1f2430;
      --border: #2a3040;
      --text: #e6e9ef;
      --muted: #8b93a7;
      --accent: #6366f1;
      --accent-hover: #7c7ff5;
      --good: #22c55e;
      --mid: #f59e0b;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--good); box-shadow: 0 0 8px var(--good); }
    header .sub { color: var(--muted); font-size: 13px; margin-left: auto; }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 880px) { .wrap { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin: 0 0 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
    input[type=text], textarea {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .metrics { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .metrics label {
      display: flex; align-items: center; gap: 6px; margin: 0;
      background: var(--panel-2); border: 1px solid var(--border);
      padding: 7px 12px; border-radius: 20px; cursor: pointer; color: var(--text); font-size: 13px;
    }
    .metrics input { accent-color: var(--accent); }
    button {
      background: var(--accent); color: #fff; border: none;
      padding: 11px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 18px; transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--panel-2); border: 1px solid var(--border); margin-top: 0; }
    .row { display: flex; gap: 10px; align-items: flex-end; }
    .row input { flex: 1; }
    .result { margin-top: 18px; }
    .score-grid { display: flex; flex-direction: column; gap: 10px; }
    .score {
      display: flex; align-items: center; gap: 14px;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
    }
    .badge {
      min-width: 44px; height: 44px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 17px; color: #0b0d12; flex-shrink: 0;
    }
    .badge.good { background: var(--good); }
    .badge.mid  { background: var(--mid); }
    .badge.bad  { background: var(--bad); }
    .score .meta { flex: 1; }
    .score .name { font-weight: 600; font-size: 14px; text-transform: capitalize; }
    .score .why { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .summary { margin-top: 14px; padding: 12px 14px; background: var(--panel-2); border-radius: 10px; border: 1px solid var(--border); font-size: 14px; }
    .summary b { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
    .empty { color: var(--muted); font-size: 14px; padding: 8px 0; }
    .err { color: var(--bad); font-size: 14px; margin-top: 12px; }
    .hist-item {
      border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
      margin-bottom: 10px; cursor: pointer; background: var(--panel-2);
    }
    .hist-item:hover { border-color: var(--accent); }
    .hist-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .hist-head .pills { display: flex; gap: 6px; }
    .pill { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 6px; color: #0b0d12; }
    .pill.good { background: var(--good); } .pill.mid { background: var(--mid); } .pill.bad { background: var(--bad); }
    .hist-prompt { color: var(--muted); font-size: 13px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-detail { margin-top: 12px; display: none; }
    .hist-detail.open { display: block; }
    .ts { color: var(--muted); font-size: 12px; }
    code { background: var(--panel); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>LLM Eval Dashboard</h1>
    <label style="margin:0 0 0 auto; display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px;">
      API key
      <input type="password" id="apiKey" value="dev-local-key" style="width:160px; padding:6px 10px;" />
    </label>
  </header>

  <div class="wrap">
    <!-- ───────────── Evaluate panel ───────────── -->
    <div class="card">
      <h2>Run an evaluation</h2>
      <label>App ID</label>
      <input type="text" id="appId" value="demo-store-bot" />

      <label>User prompt</label>
      <textarea id="userPrompt" rows="2">Can I get a refund after 90 days?</textarea>

      <label>LLM response (the text to grade)</label>
      <textarea id="llmResponse" rows="3">Absolutely! We offer unconditional lifetime refunds on everything, no questions asked, forever.</textarea>

      <label>Metrics</label>
      <div class="metrics">
        <label><input type="checkbox" value="toxicity" checked /> toxicity</label>
        <label><input type="checkbox" value="hallucination" checked /> hallucination</label>
        <label><input type="checkbox" value="brand_safety" checked /> brand_safety</label>
      </div>

      <button id="runBtn" onclick="runEval()">Evaluate</button>
      <div id="evalOut" class="result"></div>
    </div>

    <!-- ───────────── History panel ───────────── -->
    <div class="card">
      <h2>Evaluation history</h2>
      <div class="row">
        <div style="flex:1">
          <label style="margin-top:0">Filter by App ID</label>
          <input type="text" id="histAppId" value="demo-store-bot" />
        </div>
        <button class="secondary" onclick="loadHistory()">Load</button>
      </div>
      <div id="histOut" style="margin-top:18px"><div class="empty">Click “Load” to view stored evaluations.</div></div>
    </div>
  </div>

  <script>
    const API = "/api/v1";

    // Build auth headers from the API key field
    function authHeaders(extra = {}) {
      return { "Authorization": `Bearer ${document.getElementById("apiKey").value}`, ...extra };
    }

    // Scores are 1 (worst/riskiest) → 10 (best/safest)
    function tier(score) {
      if (score >= 7) return "good";
      if (score >= 4) return "mid";
      return "bad";
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function renderScores(scores) {
      return Object.entries(scores).map(([name, v]) => `
        <div class="score">
          <div class="badge ${tier(v.score)}">${v.score}</div>
          <div class="meta">
            <div class="name">${escapeHtml(name)}</div>
            <div class="why">${escapeHtml(v.reasoning)}</div>
          </div>
        </div>`).join("");
    }

    async function runEval() {
      const btn = document.getElementById("runBtn");
      const out = document.getElementById("evalOut");
      const metrics = [...document.querySelectorAll(".metrics input:checked")].map(c => c.value);

      if (metrics.length === 0) { out.innerHTML = `<div class="err">Select at least one metric.</div>`; return; }

      btn.disabled = true; btn.textContent = "Evaluating…";
      out.innerHTML = `<div class="empty">Grading with Gemini…</div>`;

      try {
        const res = await fetch(`${API}/evaluate`, {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({
            app_id: document.getElementById("appId").value,
            user_prompt: document.getElementById("userPrompt").value,
            llm_response: document.getElementById("llmResponse").value,
            eval_metrics: metrics,
          }),
        });
        const data = await res.json();
        if (data.status === "error") {
          out.innerHTML = `<div class="err">Evaluation error: ${escapeHtml(data.reasoning)}</div>`;
        } else {
          out.innerHTML = `
            <div class="score-grid">${renderScores(data.scores)}</div>
            <div class="summary"><b>Summary</b>${escapeHtml(data.reasoning)}</div>
            <div class="ts" style="margin-top:8px">Saved as <code>${data.id}</code></div>`;
        }
      } catch (e) {
        out.innerHTML = `<div class="err">Request failed: ${escapeHtml(e.message)}</div>`;
      } finally {
        btn.disabled = false; btn.textContent = "Evaluate";
      }
    }

    async function loadHistory() {
      const out = document.getElementById("histOut");
      const appId = document.getElementById("histAppId").value;
      out.innerHTML = `<div class="empty">Loading…</div>`;
      try {
        const res = await fetch(`${API}/evaluations?app_id=${encodeURIComponent(appId)}`, { headers: authHeaders() });
        const logs = await res.json();
        if (!logs.length) { out.innerHTML = `<div class="empty">No evaluations found for “${escapeHtml(appId)}”.</div>`; return; }

        out.innerHTML = logs.map((log, i) => {
          const scores = log.response.scores || {};
          const pills = Object.entries(scores)
            .map(([n, v]) => `<span class="pill ${tier(v.score)}" title="${escapeHtml(n)}">${v.score}</span>`).join("");
          const ts = new Date(log.timestamp).toLocaleString();
          return `
            <div class="hist-item" onclick="document.getElementById('d${i}').classList.toggle('open')">
              <div class="hist-head">
                <span class="ts">${ts}</span>
                <span class="pills">${pills}</span>
              </div>
              <div class="hist-prompt">▸ ${escapeHtml(log.request.llm_response)}</div>
              <div class="hist-detail" id="d${i}">
                <label style="margin-top:6px">Prompt</label>
                <div class="summary">${escapeHtml(log.request.user_prompt)}</div>
                <label>Response graded</label>
                <div class="summary">${escapeHtml(log.request.llm_response)}</div>
                <label>Scores</label>
                <div class="score-grid">${renderScores(scores)}</div>
                <div class="ts" style="margin-top:8px"><code>${log.id}</code></div>
              </div>
            </div>`;
        }).join("");
      } catch (e) {
        out.innerHTML = `<div class="err">Failed to load: ${escapeHtml(e.message)}</div>`;
      }
    }
  </script>
</body>
</html>
